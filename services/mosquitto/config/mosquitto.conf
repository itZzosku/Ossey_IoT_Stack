# Mosquitto 2.0 config — authenticated from the start.
# listener 1883 is mandatory: without it, 2.0 binds localhost-only and nothing
# external (HA, Z2M, Tasmota) can connect.

listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Require username/password. The passwd file is generated with mosquitto_passwd
# (see setup notes) and is gitignored because it holds credentials.
allow_anonymous false
password_file /mosquitto/config/passwd