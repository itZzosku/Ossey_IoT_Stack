# Telegraf — receives pushed metrics + MQTT, writes to InfluxDB 2.
# Token/org/bucket are pulled from the container environment (see docker-compose.yaml).
# No secrets live in this file, so it's safe to commit to git.

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  omit_hostname = false

# ---------------- OUTPUT ----------------
[[outputs.influxdb_v2]]
  urls = ["http://influxdb2:8086"]   # container name resolves on the iot network
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"

# ---------------- INPUTS ----------------

# Line protocol pushed over TCP on :8094 (scripts, other hosts on your LAN)
[[inputs.socket_listener]]
  service_address = "tcp://:8094"
  data_format = "influx"

# Line protocol pushed over UDP on :8092
[[inputs.socket_listener]]
  service_address = "udp://:8092"
  data_format = "influx"

# StatsD metrics on UDP :8125
[[inputs.statsd]]
  service_address = ":8125"
  metric_separator = "_"
  allowed_pending_messages = 10000

# MQTT — subscribe to topics you publish for Telegraf to collect.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["telegraf/#"]
  data_format = "influx"   # switch to "json" or "value" to match your payloads
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"

# --- Tasmota telemetry (energy, sensors) — kept long-term ---
# DISABLED for now. Uncomment the block below to re-enable.
# Tasmota publishes nested JSON on tele/<topic>/SENSOR (and /STATE).
# The json parser flattens nesting with "_", so ENERGY.Power -> field ENERGY_Power.
# String fields (Time, POWER state) are dropped automatically.
# [[inputs.mqtt_consumer]]
#   servers = ["tcp://mosquitto:1883"]
#   username = "${MQTT_USER}"
#   password = "${MQTT_PASSWORD}"
#   topics = ["tele/+/SENSOR", "tele/+/STATE"]
#   name_override = "tasmota"
#   data_format = "json"
#   [[inputs.mqtt_consumer.topic_parsing]]
#     topic = "tele/+/SENSOR"
#     tags = "_/device/_"          # middle topic segment becomes tag "device"
#   [[inputs.mqtt_consumer.topic_parsing]]
#     topic = "tele/+/STATE"
#     tags = "_/device/_"

# --- Zigbee2MQTT device telemetry (temp, humidity, battery, etc.) — kept long-term ---
# Z2M publishes flat JSON on zigbee2mqtt/<friendly_name>.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  topics = ["zigbee2mqtt/+"]
  name_override = "zigbee2mqtt"
  data_format = "json"
  fieldinclude = ["temperature", "humidity", "battery", "linkquality"]
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "zigbee2mqtt/+"
    tags = "_/location"          # friendly name becomes tag "location"
  [inputs.mqtt_consumer.tagdrop]
    location = ["bridge"]        # ignore zigbee2mqtt/bridge housekeeping topic

# Telegraf's own health stats (optional — handy while you're setting this up)
